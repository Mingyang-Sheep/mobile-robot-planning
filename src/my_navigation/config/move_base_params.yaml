shutdown_costmaps: false
controller_frequency: 10.0
planner_patience: 5   # 设为 5 表示：如果机器人在执行路径过程中停下来超过 5 秒，就重算路径（默认值是 5.0 秒）
controller_patience: 15.0
conservative_reset_dist: 3.0
planner_frequency: 0 # 每秒钟重新计算次数，设为 0 表示只计算一次
oscillation_timeout: 10.0
oscillation_distance: 0.2

base_global_planner: "my_path_planner/SpiralSTC" # 选择 SpiralSTC 作为全局路径规划器
base_global_planner: "my_path_planner/STCPlanner" # 选择 STCPlanner 作为全局路径规划器
# base_local_planner: "dwa_local_planner/DWAPlannerROS" # 选择 DWA 作为局部路径规划器
base_local_planner: "teb_local_planner/TebLocalPlannerROS" # 选择 TEB 作为局部路径规划器

# ====================== BSA 参数 ======================
# SpiralSTC:
#   # 把工具半径/机器人半径改小，让它能钻进狭窄的迷宫通道
#   robot_radius: 0.105
#   tool_radius: 0.08

# ====================== STC 参数 ======================
STCPlanner:
  robot_radius: 0.105
  tool_radius: 0.9        # 覆盖半径