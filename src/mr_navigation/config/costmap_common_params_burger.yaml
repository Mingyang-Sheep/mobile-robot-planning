# 激光能参与障碍物写入的最远距离，保持在 Burger 激光有效避障范围内。
obstacle_range: 3.0
# 激光射线清障的最远距离，略大于障碍写入距离，避免旧障碍残留。
raytrace_range: 3.5

# Burger 车体近似为 0.138m x 0.178m 的矩形，这里用中心对称 footprint 定义“生死线”。
footprint: [[-0.069, -0.089], [-0.069, 0.089], [0.069, 0.089], [0.069, -0.089]]

# 膨胀半径设为 0.2m，略大于 Burger 外接圆，给贴墙通行留出安全冗余。
inflation_radius: 0.2
# 代价值衰减斜率取 4.0，在“离墙更安全”和“窄路还能过”之间折中。
cost_scaling_factor: 4.0

# 统一使用 ROS costmap 二维代价地图类型，便于不同底盘复用同一导航栈接口。
map_type: costmap
# 当前仅以激光作为观测源，后续接入其他底盘时可在对应 _model.yaml 中扩展。
observation_sources: scan
scan:
  # 激光参考坐标系保持为通用传感器框架，不把底盘型号写进 frame_id。
  sensor_frame: base_scan
  # 观测数据类型固定为 LaserScan，兼容 ROS 1 常见 2D 激光雷达。
  data_type: LaserScan
  # 激光话题统一对齐到 /scan，保证不同底盘导航层接口一致。
  topic: /scan
  # 开启障碍写入，使局部/全局代价地图都能感知前方障碍。
  marking: true
  # 开启清障，使机器人移动后旧障碍能被射线更新清除。
  clearing: true
