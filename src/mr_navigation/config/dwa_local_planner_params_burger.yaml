DWAPlannerROS:
  # Burger 线速度上限按官方额定 0.22m/s 设置，保证动态窗口不超出底盘能力。
  max_vel_x: 0.22
  # 线速度下限设为 0，避免默认倒车行为影响小底盘在窄空间内的稳定性。
  min_vel_x: 0.0

  # Burger 是差速底盘，不允许侧向速度。
  max_vel_y: 0.0
  # Burger 是差速底盘，不允许侧向速度。
  min_vel_y: 0.0

  # 平动速度上限与底盘线速度上限保持一致，避免规划器下发不可执行速度。
  max_vel_trans: 0.22
  # 平动最小速度压到 0.08，既保留低速逼近能力，又避免临近目标时抖动停滞。
  min_vel_trans: 0.08

  # 角速度上限保留较灵活转向能力，但不过分激进以减少急转带来的轮胎打滑。
  max_vel_theta: 2.0
  # 最小角速度降低到 0.4，便于狭窄环境下做细粒度姿态修正。
  min_vel_theta: 0.4

  # 线加速度限制收敛到 1.0，优先降低起停打滑和轨迹跟踪过冲。
  acc_lim_x: 1.0
  # 差速底盘无侧向运动，因此侧向加速度保持 0。
  acc_lim_y: 0.0
  # 角加速度限制设为 2.0，在转向响应与地面附着稳定性之间折中。
  acc_lim_theta: 2.0

  # 位置到点容差设为 5cm，兼顾仿真评测精度与收敛稳定性。
  xy_goal_tolerance: 0.15
  # 朝向容差约为 10 度，避免终点附近反复小角度抖动。
  yaw_goal_tolerance: 0.2
  # 不锁存位置容差，允许姿态修正阶段继续细化位置误差。
  latch_xy_goal_tolerance: false

  # 前向模拟时间保留 1.5s，兼顾前瞻性与局部规划实时性。
  sim_time: 1.5
  # 线速度采样数设为 20，提高低速到底盘上限区间的轨迹覆盖密度。
  vx_samples: 20
  # 差速底盘无侧移采样，保持 0。
  vy_samples: 0
  # DWA 的实际参数名是 vth_samples，这里按 20 采样平衡转向分辨率与计算量。
  vth_samples: 20
  # 控制频率设为 10Hz，与局部代价地图刷新频率保持一致。
  controller_frequency: 10.0

  # 路径偏置设为 32.0，优先跟随全局路径，减少局部规划随意抄近路。
  path_distance_bias: 32.0
  # 目标偏置设为 24.0，略高于旧值，使机器人在临近终点时更积极收敛。
  goal_distance_bias: 24.0
  # 障碍代价权重设为 0.02，保持避障敏感度但不过度保守。
  occdist_scale: 0.02
  # 前瞻点评分距离保持 0.325，维持对前向可行轨迹的偏好。
  forward_point_distance: 0.325
  # 停车时间缓冲保持 0.2s，避免高频控制下误选来不及刹停的轨迹。
  stop_time_buffer: 0.2
  # 速度缩放起点保持 0.25m/s，与 Burger 的最高线速度接近，限制激进轨迹放大。
  scaling_speed: 0.25
  # 最大缩放因子保持 0.2，避免障碍附近 footprint 扩张过大导致过度保守。
  max_scaling_factor: 0.2

  # 摆动复位距离设为 5cm，小底盘轻微脱困后即可恢复正常评分。
  oscillation_reset_dist: 0.05

  # 发布候选轨迹点云，便于后续多底盘调参时可视化对比。
  publish_traj_pc: true
  # 发布代价栅格点云，便于观察参数调整对局部代价场的影响。
  publish_cost_grid_pc: true
