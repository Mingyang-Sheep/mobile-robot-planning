# Central robot configuration for dynamic switching
robots:
  burger:
    description_pkg: mobot_description
    urdf_file: turtlebot3_burger.urdf.xacro
    base_frame: base_footprint
    odom_frame: odom
    max_vel_x: 0.22
    max_vel_theta: 2.84
    min_vel_x: -0.22
    min_vel_theta: -2.84
    acc_lim_x: 2.5
    acc_lim_theta: 3.2

  waffle:
    description_pkg: mobot_description
    urdf_file: turtlebot3_waffle.urdf.xacro
    base_frame: base_footprint
    odom_frame: odom
    max_vel_x: 0.26
    max_vel_theta: 1.82
    min_vel_x: -0.26
    min_vel_theta: -1.82
    acc_lim_x: 2.5
    acc_lim_theta: 3.2

  husky:
    description_pkg: mobot_description
    urdf_file: husky.urdf.xacro
    base_frame: base_link
    odom_frame: odom
    max_vel_x: 1.0
    max_vel_theta: 2.0
    min_vel_x: -1.0
    min_vel_theta: -2.0
    acc_lim_x: 3.0
    acc_lim_theta: 3.5

planners:
  traditional:
    type: move_base
    global_planner: navfn/NavfnROS
    local_planner: dwa_local_planner/DWAPlannerROS

  rl:
    type: rl_policy
    policy_pkg: mobot_learning
    policy_node: dqn_agent_node
    model_path: $(find mobot_learning)/models/dqn_model.pt
